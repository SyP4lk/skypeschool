services:
  # -------- API (NestJS + Prisma) --------
  - type: web
    name: skypeschool-server
    env: node
    plan: free
    rootDir: server
    buildCommand: |
      npm ci
      npx prisma generate --schema ../prisma/schema.prisma
      npm run build
    startCommand: npm run render-start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false" # чтобы prisma/ts были доступны и для seed
      - key: DATABASE_URL
        sync: false     # заполнишь в Dashboard (Render PostgreSQL)
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://skypeschool-client.onrender.com
    disk:
      name: uploads
      mountPath: /opt/render/project/src/server/public/uploads
      sizeGB: 1

  # -------- Client (Next.js 15) --------
  - type: web
    name: skypeschool-client
    env: node
    plan: free
    rootDir: client
    buildCommand: |
      npm ci
      npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NEXT_PUBLIC_API_URL
        value: https://skypeschool-server.onrender.com/api
